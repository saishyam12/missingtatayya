*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#667eea,#764ba2);
    padding:15px;
}

h2{
    text-align:center;
    color:white;
    margin-bottom:15px;
}

/* Village Buttons */
.village-container{
    display:flex;
    gap:10px;
    overflow-x:auto;
    margin-bottom:20px;
}

.village-btn{
    padding:8px 15px;
    border:none;
    border-radius:20px;
    background:white;
    font-weight:bold;
    cursor:pointer;
}

/* People Section */
.people-section{
    background:white;
    padding:15px;
    border-radius:15px;
    margin-bottom:15px;
}

.person-card{
    display:flex;
    align-items:center;
    padding:10px;
    margin:8px 0;
    background:#f4f4f4;
    border-radius:10px;
    transition:0.3s;
}

.person-card.selected{
    background:#2ecc71;
    color:white;
}

.toggle{
    width:28px;
    height:28px;
    border:none;
    border-radius:50%;
    margin-right:10px;
    cursor:pointer;
    font-weight:bold;
}

/* Bottom Selected List */
.selected-section{
    background:white;
    padding:15px;
    border-radius:15px;
}

.selected-list{
    margin-top:10px;
    font-size:14px;
}

.footer{
    margin-top:10px;
    font-weight:bold;
}
</style>
</head>

let currentVillage="";

const villageContainer=document.getElementById("villageContainer");

/* Create Village Buttons */
Object.keys(data).forEach(village=>{
    const btn=document.createElement("button");
    btn.className="village-btn";
    btn.innerText=village;
    btn.onclick=()=>selectVillage(village);
    villageContainer.appendChild(btn);
});

function selectVillage(village){
    currentVillage=village;
    document.getElementById("villageTitle").innerText=village+" Guests";
    showPeople(village);
}

function showPeople(village){
    const list=document.getElementById("peopleList");
    list.innerHTML="";

    data[village].forEach(person=>{
        const div=document.createElement("div");
        div.className="person-card";

        if(selectedGuests.has(person)){
            div.classList.add("selected");  // stays green
        }

        const toggle=document.createElement("button");
        toggle.className="toggle";
        toggle.innerText="✓";
        toggle.onclick=()=>toggleSelect(person,div);

        const name=document.createElement("span");
        name.innerText=person;

        div.appendChild(toggle);
        div.appendChild(name);

        list.appendChild(div);
    });
}

function toggleSelect(person,card){

    if(selectedGuests.has(person)){
        selectedGuests.delete(person);
        card.classList.remove("selected");
    }else{
        selectedGuests.add(person);
        card.classList.add("selected");
    }

    updateSelectedList();
    localStorage.setItem("selectedGuests", JSON.stringify(Array.from(selectedGuests)));
}

function updateSelectedList(){
    const list=document.getElementById("selectedList");
    list.innerHTML=Array.from(selectedGuests).join("<br>");
    document.getElementById("totalCount").innerText=selectedGuests.size;
}
